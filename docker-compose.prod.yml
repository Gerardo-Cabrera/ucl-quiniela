# Despliegue de producción. Uso:
#   1. Crear .env en la raíz con POSTGRES_PASSWORD=<contraseña fuerte>
#   2. Configurar backend/.env (SECRET_KEY propio, API_FOOTBALL_KEY, etc.)
#   3. docker compose -f docker-compose.prod.yml up -d --build
#
# Diferencias vs. desarrollo: sin --reload ni volúmenes de código, postgres
# sin puerto expuesto, migraciones automáticas al arrancar, frontend compilado
# y servido por nginx (que también hace de proxy /api al backend).

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: quiniela
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ucl_quiniela
    volumes:
      # Bind mount en el host: los datos sobreviven a borrar imágenes/volúmenes.
      - ./data/postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiniela -d ucl_quiniela"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://quiniela:${POSTGRES_PASSWORD}@db:5432/ucl_quiniela
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
    # --proxy-headers: nginx reenvía la IP real del cliente (rate limiting).
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000
             --proxy-headers --forwarded-allow-ips='*'"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # Hereda la MTU del host en el build (evita que npm ci quede a medias si se
      # compila detrás de una VPN con MTU baja). Inocuo en un servidor normal.
      network: host
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
