server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API: proxy al backend con headers de cliente real
    # (el backend corre con --proxy-headers para rate limiting correcto).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta no encontrada cae en index.html (react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre: cache larga e inmutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
