name: CI

# Gate de calidad: se ejecuta en los push a develop/main y en los PR hacia main
# (el flujo del repo es develop -> PR -> main). Mismos checks que en local.
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

# Un run por rama: cancela el anterior si llega un push nuevo (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      # Los tests usan SQLite en memoria (aiosqlite): no hace falta PostgreSQL.
      # `python -m` evita depender de que el script de consola esté en el PATH.
      - run: python -m ruff check app tests
      - run: python -m pytest -q

  frontend:
    name: Frontend · eslint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
